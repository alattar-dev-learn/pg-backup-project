services:
  postgres:
    build: .
    container_name: pg_backup_db
    init: true
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backups:/backups
      - ./scripts:/scripts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
  pgadmin:
    image: dpage/pgadmin4
    container_name: pg_backup_admin
    env_file: .env
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
volumes:
  pg_data:
  pgadmin_data:
